<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Can't Fool the Climate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
:root{
  --bg:#0e0e0e;--surface:#181818;--s2:#202020;--s3:#252520;
  --text:#e8e0d0;--dim:#a09888;--muted:#625a52;
  --amber:#d4853a;--amberbg:rgba(212,133,58,.07);
  --teal:#3a9b7f;--red:#b84a38;
  --border:#262220;--borderl:#302c28;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;line-height:1.7;min-height:100vh}
#root{min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:720px;margin:0 auto;padding:3rem 2rem 5rem;width:100%;flex:1;transition:opacity .28s ease}
/* progress */
.prow{display:flex;align-items:center;gap:8px;margin-bottom:2.5rem;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--borderl)}
.dot.on{background:var(--amber)}.dot.done{background:var(--muted)}
/* type */
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.display{font-size:52px;font-weight:300;letter-spacing:-.025em;line-height:1.05;margin-bottom:1.5rem}
.roletag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:.75rem}
.scenario{font-size:20px;font-style:italic;line-height:1.8}
.scenario p+p{margin-top:1.1rem}
/* buttons */
.btn{background:none;border:1px solid var(--borderl);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.04em;padding:.65rem 1.8rem;cursor:pointer;transition:border-color .18s,background .18s,color .18s;display:inline-block}
.btn:hover:not(:disabled){border-color:var(--dim)}
.btn-a{border-color:var(--amber);color:var(--amber)}
.btn-a:hover:not(:disabled){background:var(--amber);color:#0e0e0e}
.btn:disabled{opacity:.22;cursor:not-allowed}
.lnk{background:none;border:none;color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:16px;cursor:pointer;padding:.65rem .5rem;text-decoration:underline;text-underline-offset:3px}
.brow{display:flex;align-items:center;gap:1.5rem;margin-top:2.25rem;flex-wrap:wrap}
/* scene banner */
.scene-banner{width:100%;margin-bottom:2rem;border:1px solid var(--border);overflow:hidden}
/* input */
.cin{background:none;border:none;border-bottom:1px solid var(--borderl);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;padding:.4rem 0;width:100%;max-width:460px;outline:none;text-align:center;transition:border-color .2s}
.cin:focus{border-color:var(--amber)}.cin::placeholder{color:var(--muted)}
/* actor card */
.acard{border:1px solid var(--border);background:var(--surface);padding:1.4rem 1.6rem;margin-bottom:1.1rem}
.acard.offset{margin-left:2rem;border-style:dashed;border-color:var(--borderl)}
.ahead{display:flex;gap:1.25rem;align-items:flex-start;margin-bottom:1.1rem}
.aname{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--amber);margin-bottom:.2rem}
.atag{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:.75rem}
.atext{font-size:17px;line-height:1.75;margin-bottom:1rem}
.pbgrid{display:flex;flex-direction:column;gap:.4rem}
.pbbtn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;padding:.45rem .9rem;cursor:pointer;text-align:left;transition:border-color .18s,color .18s;width:100%}
.pbbtn:hover:not(.used){border-color:var(--borderl);color:var(--dim)}
.pbbtn.used{color:var(--border);cursor:default;font-style:normal;border-color:var(--border)}
.pbres{margin-top:.65rem;padding:.9rem 1.1rem;background:var(--s2);border-left:2px solid var(--muted);font-size:15px;line-height:1.75;font-style:italic;color:var(--dim);animation:fi .3s ease}
.footnote{margin-top:.5rem;padding:.4rem .7rem;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);opacity:.7;border-left:1px solid var(--amber);font-style:normal}
/* choices */
.clist{display:flex;flex-direction:column;gap:.9rem;margin:1.75rem 0}
.ccard{border:1px solid var(--border);background:var(--surface);padding:1.1rem 1.4rem;cursor:pointer;display:flex;gap:1.1rem;align-items:flex-start;transition:border-color .18s,background .18s}
.ccard:hover{border-color:var(--borderl);background:var(--s2)}
.cltr{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber);flex-shrink:0;margin-top:3px}
.clbl{font-size:18px;margin-bottom:.15rem}
.cdsc{font-size:14px;color:var(--muted)}
/* confirm */
.cfbox{border:1px solid var(--borderl);background:var(--surface);padding:1.8rem 2rem;margin:1.75rem 0}
.cfnote{font-size:13px;color:var(--muted);font-style:italic;margin-top:1rem}
/* dashboard */
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.85rem;margin:1.25rem 0 2.25rem}
.metric{background:var(--surface);border:1px solid var(--border);padding:1rem 1.1rem}
.mlbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.mval{font-family:'IBM Plex Mono',monospace;font-size:36px;font-weight:500;line-height:1;transition:color 1s ease}
.mdlt{font-family:'IBM Plex Mono',monospace;font-size:11px;margin-top:.25rem}
.mhnt{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);margin-top:.15rem}
/* supply chain */
.schain{display:flex;align-items:center;gap:.6rem;margin:1.25rem 0;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.07em;flex-wrap:wrap}
.scnode{border:1px solid var(--border);padding:.3rem .6rem;color:var(--dim)}
.scarr{color:var(--amber)}
/* role shift */
.divider{border:none;border-top:1px solid var(--border);margin:2rem 0}
.rs{opacity:0;transition:opacity .8s ease}.rs.show{opacity:1}
.rstext{font-size:18px;font-style:italic;line-height:1.85;color:var(--dim)}
.ctw{opacity:0;transition:opacity .6s ease;pointer-events:none;margin-top:1.75rem}
.ctw.show{opacity:1;pointer-events:all}
/* farmer dashboard */
.fdash{background:#080c10;border:1px solid #1a2030;padding:2rem 2.25rem;margin:1.5rem 0}
.fdash-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#405060;margin-bottom:1.5rem}
.frow{display:flex;flex-direction:column;gap:1.1rem}
.fitem{font-family:'IBM Plex Mono',monospace;font-size:14px;line-height:1.6}
.fkey{color:#405060;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.2rem}
.fval{color:#a0b0c0}
.fval.alert{color:var(--amber)}
/* survey */
.survey{background:#0e0e0a;border:1px solid #28281e;padding:2rem 2.25rem;margin:1.5rem 0;font-family:'IBM Plex Mono',monospace}
.shead{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#505040;margin-bottom:1.25rem}
.sq{font-size:14px;color:#a0a090;margin-bottom:1.5rem;font-style:normal;line-height:1.7}
.sopts{display:flex;flex-direction:column;gap:.75rem}
.sopt{display:flex;align-items:flex-start;gap:.75rem;font-size:13px;line-height:1.5}
.sopt-disabled{color:#404038;cursor:not-allowed}
.sopt-ticked{color:#c0b890}
.scheckbox{width:14px;height:14px;border:1px solid #404038;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px}
.scheckbox.ticked{border-color:#a09858;color:#c0b890}
/* whats real */
.wrpanel{border-left:3px solid var(--amber);background:var(--surface);padding:2rem 2.25rem}
.wrhead{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:1.75rem}
.wrsec{margin-bottom:1.5rem}
.wrlbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.wrtext{font-size:17px;line-height:1.8}
/* report */
.csummary{font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:2.4;color:var(--dim)}
.csummary strong{color:var(--text);font-weight:500}
.dcards{display:flex;flex-direction:column;gap:.85rem;margin:2.25rem 0}
.dcard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);padding:1.1rem 1.4rem;font-size:17px;line-height:1.65}
.dsrc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:.5rem}
.portrait{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:2.25rem 0;margin:2.25rem 0;font-size:20px;font-style:italic;line-height:1.85;color:var(--dim)}
.closing{font-size:24px;font-style:italic;font-weight:300;line-height:1.55;text-align:center;padding:2.75rem 1rem;color:var(--text)}
/* reflection */
.rq{font-size:22px;font-style:italic;line-height:1.7;margin-bottom:1.75rem}
.rarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:18px;line-height:1.65;padding:1.1rem;resize:none;height:110px;outline:none;transition:border-color .2s}
.rarea:focus{border-color:var(--amber)}
.rct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:right;margin-top:.4rem}
.tbar{height:2px;background:var(--border);margin:1.1rem 0 0;overflow:hidden}
.tfill{height:100%;background:var(--amber);transition:width 1s linear}
/* done */
.donewrap{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:65vh;text-align:center;gap:1.5rem}
.opening{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:8rem}
/* portrait img */
.portrait-img{width:80px;height:95px;flex-shrink:0}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(max-width:560px){.wrap{padding:2rem 1.25rem 4rem}.display{font-size:36px}.dgrid{grid-template-columns:repeat(2,1fr)}.acard.offset{margin-left:.5rem}.portrait-img{width:60px;height:71px}}
</style>
</head>

// ─── APP ─────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('opening');
  const [op,setOp]=useState(1);
  const [inp,setInp]=useState('');
  const [cn,setCn]=useState('');
  const [round,setRound]=useState(1);
  const [choices,setChoices]=useState([null,null,null]);
  const [flags,setFlags]=useState({coalDeal:false,renewableDebt:false,industrialAgApproved:false,coalitionFormed:false});
  const [dash,setDash]=useState({...INIT});
  const [disp,setDisp]=useState({...INIT});
  const [prevDash,setPrevDash]=useState(null);
  const [animating,setAnimating]=useState(false);
  const [pending,setPending]=useState(null);
  const [pbsUsed,setPbsUsed]=useState({});
  const [rsShow,setRsShow]=useState(false);
  const [ctShow,setCtShow]=useState(false);
  const [farmerTimer,setFarmerTimer]=useState(false);
  const [reflection,setReflection]=useState('');
  const [timerPct,setTimerPct]=useState(100);
  const animRef=useRef(null);
  const rd=ROUNDS[round-1];
  const gs={choices,flags};

  const nav=useCallback((to)=>{
    setOp(0);
    setTimeout(()=>{
      setScreen(to);
      requestAnimationFrame(()=>requestAnimationFrame(()=>setOp(1)));
    },280);
  },[]);

  // animate dashboard numbers
  useEffect(()=>{
    if(!animating||!prevDash)return;
    const from={...prevDash},to={...dash},dur=1000,t0=Date.now();
    const tick=()=>{
      const p=Math.min((Date.now()-t0)/dur,1),e=1-Math.pow(1-p,3),cur={};
      for(const k of Object.keys(to))cur[k]=Math.round(from[k]+(to[k]-from[k])*e);
      setDisp(cur);
      if(p<1)animRef.current=requestAnimationFrame(tick);
      else{setAnimating(false);setDisp({...to});}
    };
    animRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(animRef.current);
  },[animating]);

  // role shift reveal timing
  useEffect(()=>{
    if(screen!=='roleshift')return;
    setRsShow(false);setCtShow(false);setFarmerTimer(false);
    const t1=setTimeout(()=>setRsShow(true),500);
    const t2=setTimeout(()=>{setCtShow(true);setFarmerTimer(true);},(rd.rsDelay+0.5)*1000);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[screen,round]);

  // reflection timer
  useEffect(()=>{
    if(screen!=='reflection')return;
    setTimerPct(100);const dur=30000,t0=Date.now();
    const id=setInterval(()=>setTimerPct(Math.max(0,(1-(Date.now()-t0)/dur)*100)),200);
    return()=>clearInterval(id);
  },[screen]);

  const confirmChoice=()=>{
    const c={...rd.cons[pending]};
    if(round===2){
      if(flags.coalDeal&&pending==='A'){c.gdp+=5;c.emissions+=5;}
      if(flags.renewableDebt&&pending==='B'){c.debt+=5;}
    }
    const newDash={};
    for(const k of Object.keys(INIT))newDash[k]=Math.max(0,Math.min(100,dash[k]+c[k]));
    const nc=[...choices];nc[round-1]=pending;
    setChoices(nc);
    setFlags(prev=>({...prev,...rd.cons[pending].flags}));
    setPrevDash({...disp});setDash(newDash);setAnimating(true);
    nav('dashboard');
  };

  const afterWhatsReal=()=>{
    if(round<3){setRound(r=>r+1);nav('scenario');}
    else nav('report');
  };

  const getPortrait=()=>{
    const ed=dash.emissions-INIT.emissions,id=dash.inequality-INIT.inequality,dd=dash.debt-INIT.debt;
    const ew=ed>5?'higher':ed<-5?'lower':'similar';
    const iw=id>5?'widened':id<-5?'narrowed':'remained stable';
    const dw=dd>5?'grew':dd<-5?'shrank':'held';
    const jw=dash.justiceIndex>65?'changed — though not from decisions made in rooms like this.':'did not change.';
    return `${cn} ends this simulation with ${ew} emissions than it began. Its inequality ${iw}. Its debt ${dw}. The farmer outside the negotiating room is still there. Her situation ${jw}`;
  };

  const Prog=({title})=>(
    <div className="prow">
      {[1,2,3].map(i=><span key={i} className={`dot${i<round?' done':i===round?' on':''}`}/>)}
      <span style={{marginLeft:'4px'}}>{title}</span>
    </div>
  );

  // ── OPENING ──
  if(screen==='opening')return(
    <div className="wrap" style={{opacity:op}}>
      <div className="opening">
        <p className="eyebrow" style={{letterSpacing:'.22em',marginBottom:'3.5rem'}}>THE CONSTRAINED ROOM</p>
        <h1 className="display" style={{fontSize:'54px',textAlign:'center',marginBottom:'3rem'}}>What is your<br/>country called?</h1>
        <input className="cin" placeholder="Enter a name." value={inp}
          onChange={e=>setInp(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&inp.trim()){setCn(inp.trim());nav('scenario');}}}
          autoFocus/>
        <div style={{marginTop:'2.5rem'}}>
          <button className="btn btn-a" disabled={!inp.trim()}
            onClick={()=>{setCn(inp.trim());nav('scenario');}}>Begin</button>
        </div>
      </div>
    </div>
  );

  // ── SCENARIO ──
  if(screen==='scenario'){
    const SceneComp=SCENES[round-1];
    const text=rd.scenario(cn,gs);
    const parts=text.split('\n\n');
    return(
      <div className="wrap" style={{opacity:op}}>
        <Prog title={`Round ${round} of 3 — ${rd.short}`}/>
        <SceneComp/>
        <p className="roletag">{rd.roleTitle(cn)}</p>
        <div className="scenario">{parts.map((p,i)=><p key={i}>{p}</p>)}</div>
        <div className="brow">
          <button className="btn btn-a" onClick={()=>nav('dialogue')}>Hear them out</button>
        </div>
      </div>
    );
  }

  // ── DIALOGUE ──
  if(screen==='dialogue'){
    const allPbsDone=rd.actors.every((a,ai)=>a.pbs.every((_,pi)=>pbsUsed[`${round}_${ai}_${pi}`]!==undefined));
    return(
      <div className="wrap" style={{opacity:op}}>
        <Prog title={`Round ${round} of 3 — ${rd.short}`}/>
        {rd.actors.map((actor,ai)=>{
          const P=PORTRAITS[actor.portrait];
          return(
            <div key={ai} className={`acard${actor.offset?' offset':''}`}>
              <div className="ahead">
                <P/>
                <div>
                  <div className="aname">{actor.name}</div>
                  <div className="atag">{actor.tag}</div>
                  <p className="atext">{rv(actor.opening,cn)}</p>
                </div>
              </div>
              <div className="pbgrid">
                {actor.pbs.map((pb,pi)=>{
                  const key=`${round}_${ai}_${pi}`;
                  const done=pbsUsed[key]!==undefined;
                  const qtext=rv(pb.q,cn);
                  const atext=rv(pb.a,cn);
                  const fntext=pb.fn?rv(pb.fn,cn):null;
                  return(
                    <div key={pi}>
                      <button className={`pbbtn${done?' used':''}`}
                        onClick={()=>!done&&setPbsUsed(prev=>({...prev,[key]:atext}))}>
                        {qtext}
                      </button>
                      {done&&(
                        <div className="pbres">
                          {atext}
                          {fntext&&<div className="footnote">{fntext}</div>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        <button className="btn btn-a" onClick={()=>{setPending(null);nav('choice');}}>Make your decision</button>
      </div>
    );
  }

  // ── CHOICE ──
  if(screen==='choice')return(
    <div className="wrap" style={{opacity:op}}>
      <Prog title={`Round ${round} of 3 — ${rd.short}`}/>
      <p className="eyebrow" style={{marginBottom:'1.25rem'}}>Your decision</p>
      <div className="clist">
        {rd.choices.map(c=>(
          <div key={c.id} className="ccard" onClick={()=>{setPending(c.id);nav('confirm');}}>
            <span className="cltr">{c.id}</span>
            <div>
              <div className="clbl">{c.label}</div>
              <div className="cdsc">{c.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  // ── CONFIRM ──
  if(screen==='confirm'){
    const chosen=rd.choices.find(c=>c.id===pending);
    return(
      <div className="wrap" style={{opacity:op}}>
        <Prog title={`Round ${round} of 3 — ${rd.short}`}/>
        <div className="cfbox">
          <p className="eyebrow">You are choosing</p>
          <p style={{fontSize:'22px',margin:'.5rem 0'}}>{chosen?.label}</p>
          <p style={{fontSize:'14px',color:'var(--muted)'}}>{chosen?.desc}</p>
          <p className="cfnote">This cannot be undone.</p>
        </div>
        <button className="btn btn-a" onClick={confirmChoice}>Confirm</button>
      </div>
    );
  }

  // ── DASHBOARD ──
  if(screen==='dashboard')return(
    <div className="wrap" style={{opacity:op}}>
      <Prog title={`Round ${round} of 3 — Consequences`}/>
      <div className="dgrid">
        {METRICS.map(m=>{
          const delta=prevDash?(dash[m.k]-prevDash[m.k]):0;
          const good=(delta>0&&m.goodUp)||(delta<0&&!m.goodUp);
          const bad=(delta>0&&!m.goodUp)||(delta<0&&m.goodUp);
          const vc=good?'var(--teal)':bad?'var(--red)':'var(--text)';
          const dc=good?'var(--teal)':bad?'var(--red)':'var(--muted)';
          return(
            <div key={m.k} className="metric">
              <div className="mlbl">{m.lbl}</div>
              <div className="mval" style={{color:delta!==0?vc:'var(--text)'}}>{disp[m.k]}</div>
              <div className="mdlt" style={{color:dc}}>{delta>0?`+${delta}`:delta<0?`${delta}`:'—'}</div>
              <div className="mhnt">{m.hint}</div>
            </div>
          );
        })}
      </div>
      <div className="brow">
        <button className="btn btn-a" onClick={()=>nav('roleshift')}>See who else was affected</button>
      </div>
    </div>
  );

  // ── ROLE SHIFT ──
  if(screen==='roleshift'){
    // Round 1: Farmer dashboard
    if(rd.roleShiftType==='farmer')return(
      <div className="wrap" style={{opacity:op}}>
        <Prog title={`Round ${round} of 3 — Another dashboard`}/>
        <p style={{fontSize:'14px',color:'var(--muted)',fontStyle:'italic',marginBottom:'1.5rem'}}>
          While you were deciding, she was notified.
        </p>
        <div className={`rs${rsShow?' show':''}`}>
          <div className="fdash">
            <div className="fdash-title">Household record — rural district</div>
            <div className="frow">
              <div className="fitem">
                <div className="fkey">Water source</div>
                <div className="fval">2km walk (seasonal stream)</div>
              </div>
              <div className="fitem">
                <div className="fkey">Last harvest</div>
                <div className="fval">Reduced by 30%</div>
              </div>
              <div className="fitem">
                <div className="fkey">Ministry of Energy notification</div>
                <div className="fval alert">Your land has been designated for infrastructure development.</div>
              </div>
            </div>
          </div>
          <p style={{fontSize:'14px',color:'var(--muted)',fontStyle:'italic',marginTop:'1rem'}}>
            No GDP tracker. No emissions index. Just this.
          </p>
        </div>
        <div className={`ctw${ctShow?' show':''}`}>
          <button className="btn btn-a" onClick={()=>nav('whatsreal')}>Continue</button>
        </div>
      </div>
    );

    // Round 2: Survey
    if(rd.roleShiftType==='survey')return(
      <div className="wrap" style={{opacity:op}}>
        <Prog title={`Round ${round} of 3 — A survey`}/>
        <p style={{fontSize:'14px',color:'var(--muted)',fontStyle:'italic',marginBottom:'1.5rem'}}>
          He was sent this. Once.
        </p>
        <div className={`rs${rsShow?' show':''}`}>
          {rd.supplyChain&&(
            <div className="schain">
              {rd.supplyChain(cn).map((node,i,arr)=>(
                <React.Fragment key={i}>
                  <span className="scnode">{node}</span>
                  {i<arr.length-1&&<span className="scarr">→</span>}
                </React.Fragment>
              ))}
            </div>
          )}
          <div className="survey">
            <div className="shead">Regional Agricultural Development Initiative — Consultation Form</div>
            <div className="sq">Do you support agricultural development in your region?</div>
            <div className="sopts">
              <div className="sopt sopt-disabled">
                <div className="scheckbox">&#160;</div>
                <span>Yes</span>
              </div>
              <div className="sopt sopt-disabled">
                <div className="scheckbox">&#160;</div>
                <span>No</span>
              </div>
              <div className="sopt sopt-ticked">
                <div className="scheckbox ticked">✓</div>
                <span>I was not asked this question before the development began</span>
              </div>
            </div>
          </div>
        </div>
        <div className={`ctw${ctShow?' show':''}`}>
          <button className="btn btn-a" onClick={()=>nav('whatsreal')}>Continue</button>
        </div>
      </div>
    );

    // Round 3: Portrait
    return(
      <div className="wrap" style={{opacity:op}}>
        <Prog title={`Round ${round} of 3 — Outside the room`}/>
        <hr className="divider"/>
        <div className={`rs${rsShow?' show':''}`}>
          <p className="rstext">{rd.roleShift(cn)}</p>
        </div>
        <div className={`ctw${ctShow?' show':''}`}>
          <button className="btn btn-a" onClick={()=>nav('whatsreal')}>Continue</button>
        </div>
      </div>
    );
  }

  // ── WHAT'S REAL ──
  if(screen==='whatsreal')return(
    <div className="wrap" style={{opacity:op}}>
      <Prog title={`Round ${round} of 3 — ${rd.short}`}/>
      <div className="wrpanel">
        <p className="wrhead">What you didn't see</p>
        <div className="wrsec">
          <p className="wrlbl">What you saw</p>
          <p className="wrtext">{rd.wr.saw}</p>
        </div>
        <div className="wrsec">
          <p className="wrlbl">What was already true</p>
          <p className="wrtext">{rd.wr.truth}</p>
        </div>
        {rd.wr.thinkers&&(
          <div className="wrsec" style={{marginBottom:0}}>
            <p className="wrlbl">Two views, unresolved</p>
            <p className="wrtext">{rd.wr.thinkers}</p>
          </div>
        )}
      </div>
      <div className="brow">
        <button className="btn btn-a" onClick={afterWhatsReal}>
          {round<3?`Round ${round+1} →`:'See your results'}
        </button>
      </div>
    </div>
  );

  // ── REPORT ──
  if(screen==='report')return(
    <div className="wrap" style={{opacity:op}}>
      <p className="eyebrow" style={{marginBottom:'1.75rem'}}>Summary</p>
      <h2 style={{fontSize:'34px',fontWeight:300,marginBottom:'1.75rem'}}>{cn}</h2>
      <div className="csummary">
        {[0,1,2].map(i=>(
          <div key={i}>Round {i+1}: {cn} <strong>{CHOICE_LABELS[i][choices[i]]}</strong>.</div>
        ))}
      </div>
      <div className="dcards">
        <div className="dcard">The world's richest 1% produce more carbon emissions per year than the poorest 50% combined.<div className="dsrc">Oxfam, 2023</div></div>
        <div className="dcard">Each year, enough grain is fed to livestock to feed every undernourished person on the planet.<div className="dsrc"> Weis (2013) </div></div>
        <div className="dcard">More than 70% of international climate finance is delivered as loans, not grants. The countries least responsible for climate change are being asked to borrow their way to safety.<div className="dsrc">OECD, 2022</div></div>
      </div>
      <div className="portrait">{getPortrait()}</div>
      <p className="closing">Every path through this game was constrained before you began. The structure of the choices available to you was not neutral. That is the point.</p>
    </div>
  );

  // ── DONE ──
  return(
    <div className="wrap" style={{opacity:op}}>
      <div className="donewrap">
        <p className="eyebrow" style={{letterSpacing:'.22em'}}> Can't Fool the Climate </p>
        <p style={{fontSize:'26px',fontStyle:'italic',fontWeight:300,maxWidth:'440px',lineHeight:1.7,textAlign:'center'}}>
          THE CONSTRAINED ROOM.
        </p>
        <p style={{fontSize:'18px',color:'var(--dim)',fontStyle:'italic',maxWidth:'380px',lineHeight:1.7,textAlign:'center'}}>
          Created by Rohan Jacob.
        </p>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
